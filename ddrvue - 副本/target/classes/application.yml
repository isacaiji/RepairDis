springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.example.database_ddr_springboot: DEBUG
    com.baomidou.mybatis plus: DEBUG