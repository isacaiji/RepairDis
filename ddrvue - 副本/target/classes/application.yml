server:
  port: 9090
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ddr_demo
    username: root
    password: 123456
#mybatis:
#  mapper-locations: classpath:mapper/*.xml
mybatis-plus:
  configuration:
